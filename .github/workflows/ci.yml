name: V1 Demo CI

on:
  push:
  pull_request:

jobs:
  verify:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: frontend/package-lock.json
      - run: python -m venv backend/.venv
      - run: backend/.venv/bin/pip install -r backend/requirements-dev.txt
      - run: backend/.venv/bin/python backend/scripts/ensure_v1_model.py
      - run: backend/.venv/bin/python backend/scripts/ensure_v2_model.py
      - run: .venv/bin/pytest -q
        working-directory: backend
      - run: npm ci
        working-directory: frontend
      - run: npm run test:coverage
        working-directory: frontend
      - run: npm run build
        working-directory: frontend
      - run: npm run generate:api
        working-directory: frontend
      - run: git diff --exit-code -- docs/openapi.json frontend/src/generated/api.d.ts
      - run: npx playwright install --with-deps chromium
        working-directory: frontend
      - run: npm run test:e2e
        working-directory: frontend
